[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

# IMPORTANT: Attach a Railway volume at /data before deploying.
# Without it, all config (keys, tokens, pairing) is lost on every restart.
# Dashboard → your service → Storage → New Volume → Mount path: /data
[deploy]
startCommand = "/app/start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

[variables]
ADMIN_USERNAME = { default = "admin", description = "Username for the Hermes admin dashboard" }
ADMIN_PASSWORD = { description = "Password for the Hermes admin dashboard. Pick something strong." }
